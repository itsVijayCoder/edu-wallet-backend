name: CI

on:
   push:
      branches: [main]
   pull_request:
      branches: [main]

jobs:
   quality:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v4
         - uses: actions/setup-go@v5
           with:
              go-version: "1.25"
         - name: Lint
           uses: golangci/golangci-lint-action@v9
           with:
              version: v2.12.2
         - name: Test
           run: go test ./... -short -race -count=1
         - name: Build
           run: go build -ldflags="-w -s" -o bin/api ./cmd/api